<!DOCTYPE html>
<html lang="sv"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>Logga in</title>
        <link rel="stylesheet" type="text/css"
              href="https://cdn.jsdelivr.net/npm/primefaces@12.0.0/resources/themes/saga/theme.css"/>
        <link rel="stylesheet" type="text/css"
              href="https://cdn.jsdelivr.net/npm/primefaces@12.0.0/resources/primeicons/primeicons.css"/>
    </h:head>
    <h:body style="padding: 2rem; display: flex; flex-direction: column; align-items: center;">
        <p:panel header="Logga in" style="width: 400px">
            <h:form>
                <p:outputLabel for="username" value="Användarnamn"/>
                <p:inputText id="username" value="#{loginBean.username}" style="width:100%"/>

                <br/><br/>

                <p:outputLabel for="password" value="Lösenord"/>
                <p:password id="password" value="#{loginBean.password}" style="width:100%"/>

                <br/><br/>

                <h:outputText value="#{loginBean.errorMessage}"
                              style="color:red"
                              rendered="#{not empty loginBean.errorMessage}"/>

                <br/>

                <p:commandButton value="Logga in"
                                 action="#{loginBean.login()}"
                                 icon="pi pi-sign-in"
                                 style="width:100%"
                                 ajax="false"/>
            </h:form>
        </p:panel>
    </h:body>
</f:view>
</html>
