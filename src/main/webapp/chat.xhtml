<!DOCTYPE html>
<html lang="sv"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>Chatt</title>
        <link rel="stylesheet" type="text/css"
              href="https://cdn.jsdelivr.net/npm/primefaces@12.0.0/resources/themes/saga/theme.css"/>
        <link rel="stylesheet" type="text/css"
              href="https://cdn.jsdelivr.net/npm/primefaces@12.0.0/resources/primeicons/primeicons.css"/>
        <script>

            // Min server
            const socket = new WebSocket("ws://localhost:8080/websocket-server/ws/chat");

            // Håkans server på render.com
            // const socket = new WebSocket("wss://chat-server-latest-yg0d.onrender.com/chatserver/chat");

            socket.onopen = () => console.log("Connected");
            socket.onerror = (e) => console.log("Error", e);
            socket.onclose = (e) => console.log("Closed", e);


            // Triggas när anslutningen är uppe
            socket.addEventListener("open", () => {
                document.getElementById("status").textContent = "CONNECTED";
            });

            // Triggas när ett meddelande tas emot - visa i loggen
            socket.addEventListener("message", (event) => {
                const log = document.getElementById("log");
                log.textContent += event.data + "\n";
            });

            // Triggas när anslutningen stängs
            socket.addEventListener("close", () => {
                document.getElementById("status").textContent = "DISCONNECTED";
            });

            // Triggas vid fel
            socket.addEventListener("error", () => {
                document.getElementById("status").textContent = "ERROR";
            });

            function sendMessage() {
                const input = document.getElementById("chatForm:messageInput");
                if (!input.value) return;
                socket.send(input.value);
                input.value = "";
            }
        </script>

    </h:head>
    <h:body style="padding: 2rem ; display: flex; flex-direction: column; align-items: center;">
        <p:panel header="Chatt" style="width: 400px">
            <p>Status: <span id="status">DISCONNECTED</span></p>
            <pre id="log" style="height:200px; overflow-y:auto; background:#f4f4f4; padding:0.5rem;"></pre>

            <h:form id="chatForm">
                <p:inputText id="messageInput"
                             placeholder="Skriv ett meddelande..."
                             style="width:100%"/>
                <br/><br/>
                <p:commandButton value="Skicka"
                                 icon="pi pi-send"
                                 style="width:100%"
                                 ajax="false"
                                 onclick="sendMessage(); return false;"/>
            </h:form>
            <br/>

            <h:form>
                <p:commandButton value="Logga ut"
                                 action="#{sessionBean.logout()}"
                                 icon="pi pi-sign-out"
                                 ajax="false"
                                 style="width:100%"/>
            </h:form>

        </p:panel>
    </h:body>
</f:view>
</html>
